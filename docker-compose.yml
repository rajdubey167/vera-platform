version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: vera_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - vera_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  db:
    image: postgres:15-alpine
    container_name: vera_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vera}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-vera} -d $${POSTGRES_DB:-vera}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vera_net

  backend:
    build:
      context: ./backend
    container_name: vera_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vera}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vera}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ENVIRONMENT: production
      FRONTEND_URL: http://localhost:3001
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - vera_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    container_name: vera_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - vera_net
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:
  neo4j_data:

networks:
  vera_net:
    driver: bridge
